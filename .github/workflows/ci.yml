name: Flutter CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Check format
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test
